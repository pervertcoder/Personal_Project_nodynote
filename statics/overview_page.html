<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <link rel="icon" href="/statics/favicon.ico" />
    <link rel="stylesheet" href="/statics/style_reset.css" />
    <link rel="stylesheet" href="/statics/overview_page.css" />
    <script src="/statics/overview_page.js" defer></script>
    <title>Overview</title>
  </head>
  <body>
    <div class="sidebar">
      <div class="blank"></div>
      <div class="profile">
        <span class="userCircle"></span>
        <input type="color" id="color__picker" />
        <span class="username">username</span>
      </div>
      <div class="blank"></div>
      <div class="func">
        <button id="newNote" type="button">
          <span class="material-symbols-outlined">add</span>
          <span id="add_note">Create New Note</span>
        </button>
      </div>
      <div class="blank2"></div>
      <div class="mainFun">
        <div class="allNotes__outlayer">
          <span class="material-symbols-outlined" id="eventnote"
            >event_note</span
          >
          <span class="allNotes" id="mynote">My Notes</span>
        </div>
        <div class="sharedNotes__outlayer">
          <span class="material-symbols-outlined">link_2</span>
          <span class="sharedNotes" id="sharednote">Shared Notes</span>
        </div>
        <div class="onlyReadNotes__outlayer">
          <span class="material-symbols-outlined">lock</span>
          <span class="onlyReadNotes" id="onlyRnote">Read Notes</span>
        </div>
      </div>
      <div class="blank2"></div>
      <div class="notification-section">
        <div class="notification-header">
          <span>Notifications</span>
          <span id="noti-count" class="notif-count"></span>
        </div>
        <div id="noti-list" class="notification-list"></div>
      </div>
      <div class="blank2"></div>
      <div class="blank3"></div>
      <div class="logout" id="logout">
        <span class="material-symbols-outlined" id="loggout">logout</span>
        <span class="logout__content">logout</span>
      </div>
    </div>
    <div class="mainContent">
      <!-- <div class="title-name"></div>
      <div class="note"></div> -->
    </div>
    <div class="coverlayer state--off">
      <div class="popup">
        <div class="topbar__popup">
          <div class="topbar__blank"></div>
          <p class="shared">分享編輯權限</p>
          <div class="button__closed--outlayer">
            <button type="button" id="close">X</button>
          </div>
        </div>
        <div class="shareContent">
          <p class="sharedEmail">請輸入分享對象的電子郵件</p>
          <div class="noteNumber"></div>
          <input
            type="text"
            id="shareEmail"
            placeholder="請輸入分享對象的電子郵件"
          />
          <div class="radio">
            <label>
              <input type="radio" name="role" value="editor" />editor
            </label>
            <label>
              <input type="radio" name="role" value="viewer" />viewer
            </label>
          </div>
          <button type="button" id="submit">Send</button>
        </div>
      </div>
    </div>
  </body>
</html>
