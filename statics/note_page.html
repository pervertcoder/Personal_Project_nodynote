<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="icon" href="/statics/favicon.ico" />
    <link rel="stylesheet" href="/statics/style_reset.css" />
    <link rel="stylesheet" href="/statics/note_page.css" />
    <script src="/statics/note_page.js" defer></script>
    <title>NodyNote</title>
  </head>
  <body>
    <div class="topbar">
      <div class="nody">
        <p class="nodynote">NodyNote</p>
      </div>
      <div class="title__wrap">
        <h1 id="title"></h1>
        <input
          type="text"
          name="title"
          id="title__input"
          class="title__state--off"
        />
      </div>
      <div class="blank">
        <div class="online__members"></div>
        <div class="share_icon_outlayer symbol__state--off">
          <span class="material-symbols-outlined">share分享</span>
        </div>
      </div>
    </div>
    <div class="online__popup online__popup--off"></div>
    <label for="note" id="remember">現在為唯讀模式，無法編輯</label>
    <div class="titleName">
      <p class="noteName">筆記名字</p>

      <input type="text" id="note_name" />
    </div>
    <div class="restrict restrict--off">
      <span class="material-symbols-outlined" id="locker">lock</span>
      <p class="onlyRead">現在為唯讀模式，無法編輯</p>
      <span class="material-symbols-outlined" id="locker">lock</span>
    </div>
    <div class="editor-wrapper">
      <div id="line__numbers"></div>
      <div id="editor"></div>
      <div id="user-status-panel"></div>
    </div>
    <div class="mainContent">
      <textarea name="note" id="note" rows="5" cols="33"></textarea>
      <div class="attendList"></div>
    </div>
    <div class="function">
      <button type="button" id="save">儲存</button>
    </div>
    <!-- <footer></footer> -->
    <div class="coverlayer state--off">
      <div class="popup">
        <div class="topbar__popup">
          <div class="topbar__blank"></div>
          <p class="shared">分享編輯權限</p>
          <div class="button__closed--outlayer">
            <button type="button" id="close">X</button>
          </div>
        </div>
        <div class="shareContent">
          <p class="sharedEmail">請輸入分享對象的電子郵件</p>
          <div class="noteNumber"></div>
          <input
            type="text"
            id="shareEmail"
            placeholder="請輸入分享對象的電子郵件"
          />
          <div class="radio">
            <label>
              <input type="radio" name="role" value="editor" />editor
            </label>
            <label>
              <input type="radio" name="role" value="viewer" />viewer
            </label>
          </div>
          <button type="button" id="submit">Send</button>
        </div>
      </div>
    </div>
  </body>
</html>
