<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/statics/favicon.ico" />
    <link rel="stylesheet" href="/statics/style_reset.css" />
    <link rel="stylesheet" href="/statics/welcome_style.css" />
    <script src="/statics/welcome_page.js" defer></script>
    <title>NodyNote</title>
  </head>
  <body>
    <div class="login login__outlayer">
      <h1>登入</h1>
      <div class="login__inner--email">
        <p>信箱</p>
        <input type="text" name="email_login" id="email_login" />
      </div>
      <div class="login__inner--password">
        <p>密碼</p>
        <input type="password" name="password_login" id="password_login" />
      </div>
      <div class="login__btn">
        <button type="button" id="loginBtn">登入</button>
      </div>
    </div>
    <div class="regist regist__outlayer">
      <h1>註冊</h1>
      <div class="regist__inner--username">
        <p>姓名</p>
        <input type="text" name="name_regist" id="name_regist" />
      </div>
      <div class="regist__inner--email">
        <p>信箱</p>
        <input type="text" name="email_regist" id="email_regist" />
      </div>
      <div class="regist__inner--password">
        <p>密碼</p>
        <input type="password" name="password_regist" id="password_regist" />
      </div>
      <div class="regist__btn">
        <button type="button" id="registBtn">註冊</button>
      </div>
    </div>
  </body>
</html>
