<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/statics/favicon.ico" />
    <link rel="stylesheet" href="/statics/style_reset.css" />
    <link rel="stylesheet" href="/statics/style.css" />
    <script src="/statics/index.js" defer></script>
    <title>NodyNote</title>
  </head>
  <body>
    <div class="topbar">
      <div class="left">
        <p class="title">NodyNote</p>
      </div>
      <div class="right">
        <div class="userCircle"></div>
        <input type="color" id="color__picker" />
        <p class="username"></p>
        <button type="button" id="logout">登出</button>
      </div>
    </div>
    <div class="middlebar">
      <button type="button" id="mynote">我的筆記</button>
      <button type="button" id="sharednote">共享的筆記</button>
      <button type="button" id="newnote">新建筆記</button>
    </div>
    <div class="note">
      <p class="nodata data__state data__state--off">查無筆記資料</p>
    </div>
    <div class="coverlayer state--off">
      <div class="popup">
        <div class="topbar__popup">
          <p class="shared">分享編輯權限</p>
          <button type="button" id="close">X</button>
        </div>
        <div class="shareContent">
          <p class="sharedEmail">請輸入分享對象的電子郵件</p>
          <div class="noteNumber"></div>
          <input
            type="text"
            id="shareEmail"
            placeholder="請輸入分享對象的電子郵件"
          />
          <button type="button" id="sumbit">送出</button>
        </div>
      </div>
    </div>
    <footer></footer>
  </body>
</html>
