name: Build and Push Docker

on:
  push: branches:["main"]

jobs:
  build: runs-on:ubuntu-latest
  steps:
    - name:Checkout
      uses:actions/checkout@v3

    - name: Login DockerHub
      run: echo "${{secrets.DOCKER_TOKEN}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin

    - name: Build Image
      run: docker build -t ${{secrets.DOCKER_USERNAME}}/nodynote:latest .

    - name: Push Image
      run: docker push  ${{secrets.DOCKER_USERNAME}}/nodynote:latest
