name: Deploy to EC2

on:
  workflow_run:
    workflows: ["Build and Push Docker"]
    types:
      - completed

jobs:
  deploy:
    if: ${{github.event.workflow_run.conclusion == 'success'}}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY}}
          port: 22
          script: |
            echo "Pull latest Docker image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/nodynote:latest

            echo "Stop old container if exists..."
            docker stop nodynote || true
            docker rm nodynote || true

            echo "Run new container..."
            docker run -d --name nodynote -p 8000:8000 ${{ secrets.DOCKER_USERNAME }}/nodynote:latest

# fix secret EC2_USER ON github
